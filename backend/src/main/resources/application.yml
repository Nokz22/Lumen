spring:
  application:
    name: lumen
  profiles:
    active: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  # Dev-only defaults below — production (Fase 7) MUST override via real environment
  # variables. Never commit a real secret here.
  jwt:
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-0123456789abcdefghijklmnop}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
  encryption:
    key: ${ENCRYPTION_KEY:zxLVCSUFSFXj60TnIb6R7L+4Y0jAPDe62VKLIvTkjqI=}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  llm:
    # "mock" (default) never calls a network and never costs anything — set to
    # "anthropic" + provide ANTHROPIC_API_KEY to use the real companion.
    provider: ${LLM_PROVIDER:mock}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    anthropic-model: ${ANTHROPIC_MODEL:claude-sonnet-5}
    anthropic-timeout-seconds: ${ANTHROPIC_TIMEOUT_SECONDS:20}

# Resilience only where a real external dependency can actually fail (see ADR-0010):
# the Anthropic call. Retry only wraps complete() (the synchronous summarization
# call) — completeStreaming() is deliberately excluded from retry because a partial
# stream may already have reached the person; retrying it risks duplicated content.
# Both share the same circuit breaker, since both hit the same upstream API.
resilience4j:
  retry:
    instances:
      anthropic-llm:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      anthropic-llm:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:lumen}
    username: ${POSTGRES_USER:lumen}
    password: ${POSTGRES_PASSWORD:changeme}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/dev-seed
  rabbitmq:
    host: localhost
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:lumen}
    password: ${RABBITMQ_DEFAULT_PASS:changeme}

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

# Hard-pinned regardless of any LLM_PROVIDER/ANTHROPIC_API_KEY present in the
# environment — automated tests must never be able to reach the real API.
app:
  llm:
    provider: mock
